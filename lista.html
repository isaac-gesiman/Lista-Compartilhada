<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lista</title>

<link rel="stylesheet" href="style.css?v=100">

</head>

<body>

<div class="voltar" id="btnVoltar">
    ↩
</div>

<div class="page-grid">

    <section class="lista-area">

        <div class="titulo-lista">

            <input
            placeholder="Nome da Lista"
            id="nomeLista">

        </div>

        <div class="novo-item">

            <input
            placeholder="Nome do item"
            id="itemNome">

            <input
            placeholder="Qtd"
            id="itemQtd">

            <button id="addItem">
                +
            </button>

        </div>

        <div id="listaItens">

        </div>

    </section>

    <section class="share-area">

      <!-- Título da área de compartilhamento -->
      <h2>
          Compartilhar
      </h2>
  
      <!-- Texto explicativo -->
      <p class="share-description">
          Adicione o e-mail de outras pessoas para que elas possam ver e editar esta lista.
      </p>
  
      <!-- Campo para adicionar colaborador -->
      <div class="share-form">
  
          <input
          placeholder="e-mail@exemplo.com">
  
          <button>
              +
          </button>
  
      </div>
  
      <!-- Lista de usuários compartilhados -->
      <div class="usuarios">
  
      </div>
  
  </section>

</div>

<div class="delete-list" id="btnApagarLista">
    Apagar Lista 🗑
</div>

<script type="module" src="lista.js?v=140"></script>


</body>
</html>
