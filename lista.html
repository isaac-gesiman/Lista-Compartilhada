<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Edite itens da sua lista e compartilhe o acesso em tempo real na Lista Compartilhada."
    />
    <title>Visualizar Lista - Lista Compartilhada</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="topbar">
      <a href="dashboard.html" class="logo-brand" id="logoBrandLista"
        >Lista Compartilhada</a
      >
      <div class="actions">
        <div class="perfil" id="btnPerfilLista" title="Sair da conta">👤</div>
      </div>
    </header>

    <main>
      <div class="btn-voltar-container">
        <button class="voltar" id="btnVoltar">
          <span>←</span> Voltar ao Painel
        </button>
      </div>

      <div class="page-grid">
        <!-- Área Principal da Lista -->
        <section class="lista-area">
          <div class="titulo-lista">
            <input
              placeholder="Sem título"
              id="nomeLista"
              aria-label="Nome da Lista"
            />
          </div>

          <div class="novo-item">
            <input
              placeholder="Novo item..."
              id="itemNome"
              class="input-base"
              aria-label="Nome do item"
            />
            <input
              placeholder="Qtd"
              id="itemQtd"
              class="input-base"
              aria-label="Quantidade do item"
            />
            <button id="addItem" aria-label="Adicionar item">+</button>
          </div>

          <div id="listaItens">
            <!-- Os itens serão gerados dinamicamente via app.js -->
          </div>
        </section>

        <!-- Painel de Compartilhamento -->
        <section class="share-area">
          <h2>Compartilhar</h2>
          <p
            style="
              font-size: 13px;
              color: var(--text-secondary);
              margin-bottom: 15px;
              line-height: 1.4;
            "
          >
            Adicione o e-mail de outras pessoas para que elas possam ver e
            editar esta lista.
          </p>
          <div class="share-form">
            <input
              type="email"
              placeholder="e-mail@exemplo.com"
              id="shareEmail"
              class="input-base"
              aria-label="E-mail para compartilhar"
            />
            <button id="btnShare" aria-label="Adicionar usuário">+</button>
          </div>
          <div class="usuarios" id="shareUsuariosList">
            <!-- Usuários compartilhados serão renderizados dinamicamente -->
          </div>
        </section>
      </div>

      <div class="delete-list-container">
        <button class="delete-list" id="btnApagarLista">Apagar Lista 🗑</button>
      </div>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
