<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Gerencie suas listas colaborativas na Lista Compartilhada. Crie, organize e acesse seus itens de forma rápida e intuitiva."
    />
    <title>Painel de Controle - Lista Compartilhada</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="topbar">
      <a href="dashboard.html" class="logo-brand" id="logoBrandDashboard"
        >Lista Compartilhada</a
      >
      <div class="actions">
        <div class="perfil" id="btnPerfil" title="Sair da conta">👤</div>
      </div>
    </header>

    <main>
      <section class="dashboard-title-area">
        <h2>Minhas Listas</h2>
        <div class="actions" style="cursor: pointer" id="actionCriarLista">
          <span
            style="
              font-weight: 600;
              font-size: 14px;
              color: var(--text-secondary);
            "
            >Nova Lista</span
          >
          <button
            class="plus-btn"
            id="btnCriarLista"
            aria-label="Criar Nova Lista"
          >
            +
          </button>
        </div>
      </section>

      <section class="listas-container" id="listasContainer">
        <!-- As listas serão renderizadas dinamicamente via app.js -->
        <!-- Layouts de fallback estáticos minimalistas que serão limpos na renderização -->
        <div class="lista-card card-base" style="opacity: 0.5">
          Carregando listas...
        </div>
      </section>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
